name: release

# Bij elke push naar 'main' wordt automatisch een nieuwe versie gebouwd en als
# GitHub Release gepubliceerd met de installer eraan. De versie is
# 0.<minor>.<runnummer> en wordt afgeleid van het automatische workflow-runnummer,
# zodat hij altijd oploopt ZONDER iets terug te committen naar de repo
# (dus geen push-conflicten meer).

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versie bepalen
        id: ver
        shell: bash
        run: |
          new=$(node -e "const fs=require('fs');const f='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(f,'utf8'));const p=j.version.split('.');const v=p[0]+'.'+p[1]+'.'+process.env.GITHUB_RUN_NUMBER;j.version=v;fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');console.log(v)")
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Versie voor deze build: $new"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Bouw & publiceer release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.ver.outputs.new }}
          releaseName: v${{ steps.ver.outputs.new }}
          releaseDraft: false
          prerelease: false

      # Upload óók het kale app-exe naar de release. De in-app updater vervangt
      # alleen dit bestand (geen herinstallatie), zodat de taakbalk-pin behouden blijft.
      - name: Kaal exe meeleveren (voor in-place updates)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          src=$(find src-tauri/target/release -maxdepth 1 -iname 'macsplorer.exe' | head -n1)
          if [ -z "$src" ]; then echo "Kaal exe niet gevonden"; ls -la src-tauri/target/release; exit 1; fi
          cp "$src" "Macsplorer.exe"
          gh release upload "v${{ steps.ver.outputs.new }}" "Macsplorer.exe" --clobber
